version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cr_announcements
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cr_announcements?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 24h
      FILE_EXPIRY_DAYS: "15"
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
      - wwebjs_auth:/app/.wwebjs_auth

volumes:
  pgdata:
  uploads:
  wwebjs_auth:
